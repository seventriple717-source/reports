<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      color-scheme: dark;
      --bg: #070c19;
      --bg2: #0d1526;
      --bg3: #131f35;
      --panel: rgba(19,31,53,.72);
      --panel2: rgba(255,255,255,.035);
      --border: rgba(255,255,255,.075);
      --border2: rgba(148,163,184,.18);
      --text: #e8eef7;
      --text2: #a8bdd4;
      --text3: #6e8eac;
      --blue: #60a5fa;
      --violet: #a78bfa;
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --cyan: #22d3ee;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(96,165,250,.055), transparent 320px),
        linear-gradient(135deg, rgba(52,211,153,.035), transparent 520px),
        var(--bg);
      color: var(--text);
      font: 12px/1.55 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, #000 0%, rgba(0,0,0,.75) 36%, transparent 86%);
    }

    a { color: #93c5fd; text-decoration: none; }
    a:hover { color: #bfdbfe; text-decoration: underline; }

    .page {
      width: min(1700px, calc(100vw - 44px));
      margin: 0 auto;
      padding: 28px 0 52px;
      position: relative;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
      padding: 0 0 18px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }

    .eyebrow {
      color: var(--text3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.6px;
    }

    .source-label {
      margin-top: 5px;
      color: rgba(168,189,212,.72);
      font-size: 9px;
      line-height: 1.35;
      letter-spacing: .2px;
      text-transform: none;
    }

    .source-label::before {
      content: "依据：";
      color: rgba(52,211,153,.82);
      font-weight: 700;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: 28px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(130deg, var(--blue), var(--violet) 48%, var(--green));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      margin: 0 0 15px;
      color: var(--text2);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 3px;
      text-align: center;
      text-transform: uppercase;
    }

    h3 {
      margin: 0 0 7px;
      font-size: 12px;
      letter-spacing: .5px;
    }

    .subtitle {
      max-width: 980px;
      margin: 0 auto 14px;
      color: var(--text2);
      font-size: 12px;
    }

    .thesis-grid, .kpi-grid, .chain-grid, .value-grid {
      display: grid;
      gap: 10px;
    }

    .thesis-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 14px;
    }

    .kpi-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-top: 12px;
    }

    .chain-grid {
      display: flex;
      gap: 0;
      min-width: 1500px;
      align-items: stretch;
    }

    .value-grid { grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); }

    .card, .kpi, .theme, .section {
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: 8px;
    }

    .card {
      padding: 11px 13px;
      color: #cbd5e1;
      text-align: left;
    }

    .kpi {
      padding: 10px 12px;
      background: rgba(37,99,235,.07);
      border-color: rgba(96,165,250,.20);
      text-align: left;
    }

    .section {
      padding: 18px 22px;
      margin-top: 22px;
      background: rgba(255,255,255,.025);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    #chain-map {
      overflow-x: auto;
      padding: 0 0 10px;
      border: 0;
      background: transparent;
    }

    .kpi strong {
      display: block;
      margin: 2px 0 1px;
      font-size: 20px;
      line-height: 1.15;
      color: #f8fafc;
    }

    .kpi span, .muted {
      color: var(--text3);
      font-size: 10px;
    }

    .tier {
      flex: 1;
      min-width: 285px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(19,31,53,.76);
      overflow: hidden;
      position: relative;
    }

    .tier + .tier {
      margin-left: 34px;
    }

    .tier + .tier::before {
      content: "→";
      position: absolute;
      left: -28px;
      top: 58px;
      color: rgba(148,163,184,.55);
      font-size: 20px;
      font-weight: 800;
    }

    .tier:nth-child(1) { --accent: #60a5fa; --accent-soft: rgba(96,165,250,.12); }
    .tier:nth-child(2) { --accent: #34d399; --accent-soft: rgba(52,211,153,.12); }
    .tier:nth-child(3) { --accent: #22d3ee; --accent-soft: rgba(34,211,238,.11); }
    .tier:nth-child(4) { --accent: #a78bfa; --accent-soft: rgba(167,139,250,.11); }
    .tier:nth-child(5) { --accent: #fbbf24; --accent-soft: rgba(251,191,36,.11); }

    .tier-head {
      height: 58px;
      padding: 9px 13px;
      background: var(--accent-soft);
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .tier-head h3 {
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .tier-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--text3);
      font-size: 9.5px;
    }

    .company-list {
      display: grid;
      gap: 7px;
      padding: 10px 9px 12px;
    }

    .company {
      border: 1px solid rgba(255,255,255,.07);
      border-left: 3px solid var(--accent);
      background: rgba(255,255,255,.035);
      border-radius: 0 6px 6px 0;
      padding: 7px 9px;
      transition: background .16s ease, transform .16s ease, box-shadow .16s ease;
    }

    .company:hover {
      background: rgba(255,255,255,.068);
      transform: translateX(3px);
      box-shadow: -4px 0 16px rgba(0,0,0,.24);
    }

    .company-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 7px;
    }

    .company-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .report-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid rgba(96,165,250,.28);
      background: rgba(96,165,250,.10);
      color: #93c5fd;
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      text-decoration: none;
    }

    .report-btn.valuation {
      border-color: rgba(52,211,153,.28);
      background: rgba(52,211,153,.10);
      color: #6ee7b7;
    }

    .report-btn.pending {
      border-color: rgba(148,163,184,.14);
      background: rgba(148,163,184,.055);
      color: rgba(148,163,184,.58);
      cursor: default;
    }

    .ticker {
      color: #f8fafc;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .5px;
    }

    .pill, .priority, .grade {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 18px;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 9px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,.16);
      white-space: nowrap;
      color: var(--text2);
      background: rgba(255,255,255,.045);
    }

    .priority.P0, .grade.A { color: #052e18; background: #34d399; border-color: #34d399; }
    .priority.P1, .grade.B { color: #271400; background: #fbbf24; border-color: #fbbf24; }
    .priority.P2, .grade.C { color: #dbeafe; background: rgba(96,165,250,.18); border-color: rgba(96,165,250,.38); }
    .grade.D { color: #fee2e2; background: rgba(248,113,113,.20); border-color: rgba(248,113,113,.48); }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(345px, 1fr));
      gap: 10px;
    }

    .theme {
      padding: 12px 14px;
      background: rgba(19,31,53,.70);
      border-left: 3px solid rgba(96,165,250,.42);
      transition: transform .16s ease, background .16s ease;
    }

    .theme:hover {
      background: rgba(255,255,255,.052);
      transform: translateY(-2px);
    }

    .theme-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .theme p { margin: 0; color: #dbeafe; }
    .theme ul {
      margin: 9px 0 0;
      padding-left: 16px;
      color: var(--text3);
      font-size: 10px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(7,12,25,.42);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1240px;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,.055);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #bfdbfe;
      background: rgba(96,165,250,.075);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .5px;
      position: sticky;
      top: 0;
    }

    td { color: #cbd5e1; font-size: 10px; }
    tbody tr:hover td { background: rgba(255,255,255,.025); }

    .bar-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      padding: 11px 13px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px;
      background: rgba(255,255,255,.032);
    }

    .bar-row strong {
      color: #e0e7ff;
      font-size: 11px;
    }

    .bar-track {
      height: 6px;
      background: rgba(255,255,255,.075);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 3px;
    }

    .risk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
      gap: 10px;
    }

    .risk {
      border: 1px solid rgba(248,113,113,.18);
      border-left: 3px solid var(--red);
      padding: 11px 13px;
      background: rgba(248,113,113,.045);
      border-radius: 0 8px 8px 0;
    }

    .source-list {
      display: grid;
      gap: 7px;
      padding-left: 18px;
      color: var(--text3);
      font-size: 10px;
    }

    @media (max-width: 880px) {
      .page { width: min(100vw - 24px, 1700px); padding-top: 18px; }
      h1 { font-size: 24px; letter-spacing: 3px; }
      .hero { padding-bottom: 14px; }
      .thesis-grid, .kpi-grid { grid-template-columns: 1fr; }
      .chain-grid { display: grid; min-width: 0; grid-template-columns: 1fr; gap: 10px; }
      .tier + .tier { margin-left: 0; }
      .tier + .tier::before { display: none; }
      .theme-grid, .bar-list, .risk-grid, .value-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));

    function renderHero() {
      const thesis = DATA.thesis.map(item => `<div class="card">${esc(item)}</div>`).join("");
      const kpis = DATA.kpis.map(item => `
        <div class="kpi">
          <span>${esc(item.label)}</span>
          <strong>${esc(item.value)}</strong>
          <span>${esc(item.note)}</span>
        </div>`).join("");
      document.getElementById("hero").innerHTML = `
        <div class="eyebrow">Industry Chain Research | As of ${esc(DATA.asOfDate)}</div>
        <h1>${esc(DATA.industry)}产业链全景研究</h1>
        <p class="subtitle">${esc(DATA.subtitle)}</p>
        <div class="thesis-grid">${thesis}</div>
        <div class="kpi-grid">${kpis}</div>`;
    }

    function renderChain() {
      const tiers = DATA.tiers.map(tier => `
        <article class="tier">
          <div class="tier-head">
            <h3>${esc(tier.name)}</h3>
            <div class="tier-meta"><span>${esc(tier.role)}</span><span>价值捕获：${esc(tier.valueCapture)}</span></div>
          </div>
          <div class="company-list">
            ${tier.companies.map(company => `
              <div class="company">
                <div class="company-top">
                  <span><span class="ticker">${esc(company.ticker)}</span> ${esc(company.cnName || company.name)}</span>
                  <span class="pill">${esc(company.exchange)}</span>
                </div>
                <div>${esc(company.exposure)} · ${esc(company.purity)}</div>
                <div class="muted">${esc(company.why)}</div>
                <div class="company-actions">
                  ${company.researchUrl ? `<a class="report-btn" href="${esc(company.researchUrl)}" target="_blank" rel="noopener">研究报告</a>` : `<span class="report-btn pending">研究报告</span>`}
                  ${company.valuationUrl ? `<a class="report-btn valuation" href="${esc(company.valuationUrl)}" target="_blank" rel="noopener">估值报告</a>` : `<span class="report-btn valuation pending">估值报告</span>`}
                </div>
              </div>`).join("")}
          </div>
        </article>`).join("");
      document.getElementById("chain-map").innerHTML = `<h2>产业链地图</h2><div class="chain-grid">${tiers}</div>`;
    }

    function renderThemes() {
      const themes = DATA.themes.map(theme => `
        <article class="theme">
          <div class="theme-head">
            <h3>${esc(theme.name)}</h3>
            <span class="priority ${esc(theme.priority)}">${esc(theme.priority)}</span>
          </div>
          <p>${esc(theme.thesis)}</p>
          <ul>
            <li>量化依据：${esc(theme.evidence)}</li>
            <li>相关环节：${esc(theme.tiers.join(" / "))}</li>
            <li>代表公司：${esc(theme.companies.join(", "))}</li>
            <li>监控指标：${esc(theme.monitor)}</li>
            <li>失效条件：${esc(theme.failure)}</li>
          </ul>
        </article>`).join("");
      document.getElementById("theme-matrix").innerHTML = `<h2>投资主题矩阵</h2><div class="theme-grid">${themes}</div>`;
    }
