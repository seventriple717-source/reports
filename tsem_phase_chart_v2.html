<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d10;
  --s1:#17171d;
  --s2:#1f1f28;
  --s3:#252531;
  --border:#2a2a36;
  --border-strong:#3a3a4d;
  --text-primary:#e2e2ea;
  --text-secondary:#8e8ea8;
  --text-muted:#52526a;
  --up:#2ed8a0;
  --dn:#f05c5b;
  --neu:#8e8ea8;
}
html,body{background:var(--bg);color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;min-height:100vh}
body{padding:24px 28px 48px;max-width:900px;margin:0 auto}
h1{font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:3px;letter-spacing:-0.01em}
.subtitle{font-size:12px;color:var(--text-muted);margin-bottom:20px}
#tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tab-btn{font-size:12px;padding:5px 12px;border-radius:7px;border:0.5px solid var(--border-strong);background:var(--s1);color:var(--text-secondary);cursor:pointer;transition:all .15s;line-height:1.5;font-family:inherit}
.tab-btn:hover{background:var(--s2);color:var(--text-primary)}
.chart-wrap{position:relative;width:100%;height:300px;background:var(--s1);border-radius:12px;border:0.5px solid var(--border);padding:16px 16px 10px;margin-bottom:14px}

/* ── card ── */
#card{background:var(--s1);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:16px 20px 14px;border-bottom:0.5px solid var(--border)}
.card-meta{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.phase-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;letter-spacing:.02em}
.card-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:3px;line-height:1.3}
.card-range{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:8px}
.range-sep{color:var(--border-strong)}
.card-body-wrap{padding:16px 20px;display:grid;gap:16px}

/* overview */
.overview{font-size:13px;color:var(--text-secondary);line-height:1.75}

/* events timeline */
.section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.timeline{display:flex;flex-direction:column;gap:0}
.ev{display:grid;grid-template-columns:90px 14px 1fr;gap:0 10px;align-items:start}
.ev-date{font-size:11px;color:var(--text-muted);font-variant-numeric:tabular-nums;padding-top:1px;text-align:right;line-height:1.5}
.ev-dot-col{display:flex;flex-direction:column;align-items:center}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-line{width:1px;background:var(--border);flex:1;min-height:8px}
.ev:last-child .ev-line{display:none}
.ev-text{font-size:12.5px;color:var(--text-secondary);line-height:1.6;padding-bottom:12px}
.ev-text b{color:var(--text-primary);font-weight:500}

/* drivers */
.drivers{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.drivers{grid-template-columns:1fr}}
.driver-box{background:var(--s2);border-radius:8px;padding:11px 13px;border:0.5px solid var(--border)}
.driver-head{font-size:11px;font-weight:600;letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.driver-arrow{font-size:13px}
.driver-item{font-size:12px;color:var(--text-secondary);line-height:1.55;padding-left:10px;position:relative;margin-bottom:4px}
.driver-item::before{content:'·';position:absolute;left:2px;color:var(--text-muted)}

/* stats */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.stat-item{background:var(--s2);border-radius:7px;padding:10px 12px}
.stat-label{font-size:10px;color:var(--text-muted);margin-bottom:3px;letter-spacing:.02em}
.stat-val{font-size:13px;font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums}
</style>
</head>

var prices = RAW.map(function(r){ return r[1]; });

function inPhase(d,p){ return d>=p.from&&d<=p.to; }

var datasets = PHASES.map(function(p){
  return {
    label:p.label, data:labels.map(function(d,i){ return inPhase(d,p)?prices[i]:null; }),
    borderColor:p.color, backgroundColor:'transparent',
    borderWidth:2.5, pointRadius:0, pointHoverRadius:5, spanGaps:false, tension:0.3
  };
});

var ctx = document.getElementById('ch').getContext('2d');
new Chart(ctx,{
  type:'line', data:{labels:labels,datasets:datasets},
  options:{
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    scales:{
      x:{ticks:{color:'#52526a',font:{size:11},maxTicksLimit:9,
          callback:function(v,i){ var d=labels[i]; if(!d)return''; var m=d.substring(5,7); return m==='01'||m==='06'?d.substring(0,4):''; }},
        grid:{color:'#1e1e28'}, border:{color:'#2a2a36'}},
      y:{type:'logarithmic',min:1,
        ticks:{color:'#52526a',font:{size:11},
          callback:function(v){ return [1,2,5,10,20,50,100,200,300].indexOf(Math.round(v))>-1?'$'+Math.round(v):''; }},
        grid:{color:'#1e1e28'}, border:{color:'#2a2a36'}}

    plugins:{
      legend:{display:false},

});

var tabsEl=document.getElementById('tabs'), cardEl=document.getElementById('card');
PHASES.forEach(function(p,i){
  var b=document.createElement('button'); b.className='tab-btn'; b.textContent=p.label;
  b.onclick=function(){ showPhase(i); }; tabsEl.appendChild(b);
});

function dot(dir){
  var c = dir==='up'?'#2ed8a0':dir==='dn'?'#f05c5b':'#52526a';
  return '<div class="ev-dot" style="background:'+c+'"></div>';
}

function showPhase(idx){
  tabsEl.querySelectorAll('.tab-btn').forEach(function(b,i){
    if(i===idx){
      b.style.background=PHASES[idx].color+'22';
      b.style.color=PHASES[idx].color;
      b.style.borderColor=PHASES[idx].color+'66';
    } else { b.style.background=''; b.style.color=''; b.style.borderColor=''; }
  });
  var p=PHASES[idx];

  var evHtml=p.events.map(function(e){
    return '<div class="ev">'
      +'<div class="ev-date">'+e.date+'</div>'
      +'<div class="ev-dot-col">'+dot(e.dir)+'<div class="ev-line"></div></div>'
      +'<div class="ev-text">'+e.text+'</div>'
      +'</div>';
  }).join('');

  var upHtml=p.up.map(function(s){ return '<div class="driver-item">'+s+'</div>'; }).join('');
  var dnHtml=p.dn.map(function(s){ return '<div class="driver-item">'+s+'</div>'; }).join('');

  var statsHtml=p.stats.map(function(s){
    return '<div class="stat-item"><div class="stat-label">'+s[0]+'</div><div class="stat-val">'+s[1]+'</div></div>';
  }).join('');

  cardEl.innerHTML=
    '<div class="card-header">'
    +'<div class="card-meta">'
    +'<span class="phase-tag" style="background:'+p.color+'22;color:'+p.color+'">'+p.label+'</span>'
    +'<div><div class="card-title">'+p.title+'</div>'
    +'<div class="card-range">'+p.range+'</div></div>'
    +'</div>'
    +'</div>'
    +'<div class="card-body-wrap">'
    +'<div class="overview">'+p.overview+'</div>'
    +'<div><div class="section-label">关键事件时间线</div><div class="timeline">'+evHtml+'</div></div>'
    +'<div><div class="section-label">涨跌归因</div>'
    +'<div class="drivers">'
    +'<div class="driver-box"><div class="driver-head"><span class="driver-arrow" style="color:#2ed8a0">↑</span><span style="color:#2ed8a0">上涨驱动</span></div>'+upHtml+'</div>'
